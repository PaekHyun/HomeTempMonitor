<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 640" font-family="Arial, sans-serif">
  <defs>
    <filter id="shadow" x="-2%" y="-2%" width="104%" height="104%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.15"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="280" height="640" fill="#E0E0E0" rx="4"/>

  <!-- E-Paper Module Frame -->
  <rect x="20" y="15" width="240" height="610" rx="8" fill="#333" filter="url(#shadow)"/>

  <!-- E-Paper Active Area (128x296 scaled 1.7x = 218x503) -->
  <!-- Centered in the frame -->
  <rect x="31" y="30" width="218" height="503" rx="2" fill="#F5F5F0"/>

  <!-- ═══════════════════════════════════════ -->
  <!-- Display Content (simulated)            -->
  <!-- ═══════════════════════════════════════ -->

  <!-- Title: "Home Climate" -->
  <text x="42" y="62" font-size="20" font-weight="bold" fill="#222">Home Climate</text>

  <!-- Title underline (thick) -->
  <rect x="31" y="70" width="218" height="3" fill="#222"/>

  <!-- TEMPERATURE label (red) -->
  <text x="42" y="100" font-size="14" font-weight="bold" fill="#CC0000">TEMPERATURE</text>

  <!-- Current temperature (large) -->
  <text x="50" y="160" font-size="48" font-weight="bold" fill="#222">24.5</text>
  <!-- Degree + C (smaller) -->
  <text x="195" y="140" font-size="22" font-weight="bold" fill="#222">°C</text>

  <!-- Min/Max temperature (red) -->
  <text x="42" y="190" font-size="13" fill="#CC0000">22.1~26.3°C</text>

  <!-- Divider (thin) -->
  <rect x="31" y="200" width="218" height="1.5" fill="#888"/>

  <!-- HUMIDITY label -->
  <text x="42" y="228" font-size="14" font-weight="bold" fill="#222">HUMIDITY</text>

  <!-- Current humidity (large) -->
  <text x="50" y="290" font-size="48" font-weight="bold" fill="#222">45.2</text>
  <!-- Percent sign (smaller) -->
  <text x="195" y="270" font-size="22" font-weight="bold" fill="#222">%</text>

  <!-- Min/Max humidity -->
  <text x="42" y="320" font-size="13" fill="#222">40.0~55.2%</text>

  <!-- Bottom thick line -->
  <rect x="31" y="335" width="218" height="3" fill="#222"/>

  <!-- Date/Time from RTC -->
  <text x="42" y="365" font-size="13" fill="#222">06-30 08:10</text>

  <!-- Sensor status -->
  <text x="42" y="390" font-size="13" fill="#222">SHT:OK  Log:OK</text>

  <!-- Boot count, interval, battery -->
  <text x="42" y="415" font-size="13" fill="#222">#42  5min  ~154d</text>

  <!-- ═══════════════════════════════════════ -->
  <!-- Module labels below the display        -->
  <!-- ═══════════════════════════════════════ -->
  <text x="140" y="555" text-anchor="middle" font-size="11" fill="#999">WeAct 2.9" BWR E-Paper</text>
  <text x="140" y="572" text-anchor="middle" font-size="10" fill="#999">SSD1680 · 128×296 · SPI</text>

  <!-- Color legend -->
  <rect x="40" y="590" width="12" height="12" rx="2" fill="#222"/>
  <text x="58" y="601" font-size="10" fill="#666">Black</text>
  <rect x="110" y="590" width="12" height="12" rx="2" fill="#CC0000"/>
  <text x="128" y="601" font-size="10" fill="#666">Red</text>
  <rect x="170" y="590" width="12" height="12" rx="2" fill="#F5F5F0" stroke="#ccc"/>
  <text x="188" y="601" font-size="10" fill="#666">White</text>
</svg>
